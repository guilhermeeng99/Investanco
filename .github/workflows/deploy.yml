name: Deploy to GitHub Pages

# Builds the web app (with Drift's WASM assets) and a release-signed Android APK,
# publishes the web build to gh-pages (bundling the APK for download), and
# distributes the APK to testers via Firebase App Distribution.
#
# Signing + distribution use repository secrets: ANDROID_KEYSTORE_BASE64,
# ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, FIREBASE_SERVICE_ACCOUNT_ANDROID.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: dart run build_runner build
      - run: dart run slang
      - run: flutter analyze
      - run: flutter test

      # Drift needs these two assets to run SQLite in the browser.
      - name: Download Drift web assets
        run: |
          curl -L -o web/sqlite3.wasm \
            "https://github.com/simolus3/sqlite3.dart/releases/download/sqlite3-3.3.1/sqlite3.wasm"
          curl -L -o web/drift_worker.dart.js \
            "https://github.com/simolus3/drift/releases/download/drift-2.33.0/drift_worker.js"

      # --no-tree-shake-icons is required: allocation classes let the user PICK any
      # glyph from `allocationIcons`, and asset/institution/transaction icons resolve
      # through runtime switches. The icon tree-shaker can only keep glyphs it sees
      # referenced as constants, so it strips the runtime-selected ones and they
      # render as tofu boxes. Keep the full Font Awesome set. See docs/specs/allocation.md.
      - name: Build web
        run: |
          flutter build web --release \
            --no-tree-shake-icons \
            --base-href /Investanco/ \
            --build-number=$GITHUB_RUN_NUMBER \
            --dart-define=FINNHUB_TOKEN=${{ secrets.FINNHUB_TOKEN }} \
            --dart-define=BRAPI_TOKEN=${{ secrets.BRAPI_TOKEN }}

      - name: Restore Android keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          {
            echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
            echo "keyPassword=$ANDROID_KEYSTORE_PASSWORD"
            echo "keyAlias=$ANDROID_KEY_ALIAS"
            echo "storeFile=upload-keystore.jks"
          } > android/key.properties

      # --no-tree-shake-icons: same reason as the web build above — runtime-selected
      # Font Awesome glyphs would be stripped and render as tofu boxes.
      - name: Build Android APK (release-signed)
        run: |
          flutter build apk --release \
            --no-tree-shake-icons \
            --build-number=$GITHUB_RUN_NUMBER \
            --dart-define=FINNHUB_TOKEN=${{ secrets.FINNHUB_TOKEN }} \
            --dart-define=BRAPI_TOKEN=${{ secrets.BRAPI_TOKEN }}

      - name: Distribute APK to testers (Firebase App Distribution)
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: "1:305852403095:android:e0fcd59c990a5c849008d2"
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ANDROID }}
          testers: guilhermeeng99@gmail.com,guigapasocax@gmail.com
          file: build/app/outputs/flutter-apk/app-release.apk
          releaseNotes: "Build ${{ github.run_number }} from main"

      - name: Bundle APK with web build
        run: cp build/app/outputs/flutter-apk/app-release.apk build/web/investanco.apk

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/web
