name: investanco
description: "Investanco - personal investment portfolio tracker"
publish_to: "none"
version: 0.2.2+1

environment:
  sdk: ^3.12.0

dependencies:
  cloud_firestore: ^6.4.1
  dartz: ^0.10.1
  dio: ^5.9.2
  drift: ^2.33.0
  drift_flutter: ^0.3.0
  equatable: ^2.0.8
  file_picker: ^11.0.2
  firebase_auth: ^6.5.1
  firebase_core: ^4.9.0
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_bloc: ^9.1.1
  flutter_localizations:
    sdk: flutter
  font_awesome_flutter: ^11.0.0
  get_it: ^9.2.1
  go_router: ^17.2.3
  google_fonts: ^8.0.2
  google_sign_in: ^7.2.0
  intl: ^0.20.2
  package_info_plus: ^9.0.1
  path: ^1.9.1
  path_provider: ^2.1.5
  shared_preferences: ^2.3.0
  shimmer: ^3.0.0
  slang: ^4.15.0
  slang_flutter: ^4.15.0
  sqlite3_flutter_libs: ^0.6.0+eol
  uuid: ^4.5.3
  web: ^1.1.0

dev_dependencies:
  bloc_test: ^10.0.0
  build_runner: ^2.15.0
  drift_dev: ^2.33.0
  fake_cloud_firestore: ^4.1.1
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.5
  very_good_analysis: ^10.2.0

flutter:
  uses-material-design: true

  assets:
    - lib/app/assets/images/

flutter_launcher_icons:
  image_path: lib/app/assets/images/logo.png
  android: true
  ios: true
  remove_alpha_ios: true
  web:
    generate: true
    image_path: lib/app/assets/images/logo.png
    background_color: "#6366F1"
    theme_color: "#6366F1"
  adaptive_icon_background: "#6366F1"
  adaptive_icon_foreground: lib/app/assets/images/logo.png
