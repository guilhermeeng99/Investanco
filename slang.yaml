# slang i18n configuration. Base locale is Brazilian Portuguese.
# Translation sources live in lib/app/assets/i18n (mirrors financo).
# Run `dart run slang` after editing any *.i18n.json to regenerate lib/gen/i18n.
base_locale: pt
input_directory: lib/app/assets/i18n
input_file_pattern: .i18n.json
output_directory: lib/gen/i18n
output_file_name: strings.g.dart
translate_var: t
# Bundle every locale into the main chunk. Deferred (lazy) loading turns
# non-base locales into deferred imports, which makes setLocaleSync throw on
# web ("l_en was not loaded") — used by AppLocaleCubit to apply the locale on
# boot. Bundling keeps the sync path working.
lazy: false
